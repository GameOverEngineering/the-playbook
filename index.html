<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Playbook: Sovereign Family Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rajdhani:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #2d5a27; font-family: 'Rajdhani', sans-serif; color: white; overflow-x: hidden; }
        .comic-title { font-family: 'Bangers', cursive; color: #E61E27; text-shadow: 3px 3px 0px #000, 6px 6px 0px #FFD000; }
        .studs { background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 20px 20px; }
        .btn-comic { transition: transform 0.1s; border: 3px solid black; box-shadow: 4px 4px 0px black; text-transform: uppercase; font-weight: 900; }
        .btn-comic:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px black; }
        .time-bubble { background: #000; color: #FFD000; padding: 2px 8px; font-size: 10px; border-radius: 5px; font-family: 'Rajdhani'; cursor: pointer; }
    </style>
</head>
<body class="studs">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('playbook'); 
            const [selectedArchive, setSelectedArchive] = useState(null);

            // FORCE HERO MODE ON FOR FAMILY TESTING
            const [config, setConfig] = useState(() => {
                const saved = localStorage.getItem('pb_v26_config');
                return saved ? JSON.parse(saved) : {
                    hero: true, // UNLOCKED for Chris/Family
                    sections: [
                        { id: 's1', label: 'Breakfast Box', color: '#FF5F1F', active: true, time: '08:00' },
                        { id: 's2', label: 'School Learning', color: '#FFFFFF', active: true, time: '09:00' },
                        { id: 's3', label: 'Lunch & Recess', color: '#a6ff00', active: true, time: '12:00' },
                        { id: 's4', label: 'Afternoon Fun', color: '#FFFFFF', active: true, time: '13:30' },
                        { id: 's5', label: 'Evening Activities', color: '#2196F3', active: true, time: '17:00' },
                        { id: 's6', label: 'Bedtime Routine', color: '#9C27B0', active: true, time: '19:30' }
                    ]
                };
            });

            const [schedule, setSchedule] = useState(() => {
                const saved = localStorage.getItem('pb_v26_current');
                return saved ? JSON.parse(saved) : { Monday: {s1:[], s2:[], s3:[], s4:[], s5:[], s6:[]}, Tuesday: {s1:[], s2:[], s3:[], s4:[], s5:[], s6:[]}, Wednesday: {s1:[], s2:[], s3:[], s4:[], s5:[], s6:[]}, Thursday: {s1:[], s2:[], s3:[], s4:[], s5:[], s6:[]}, Friday: {s1:[], s2:[], s3:[], s4:[], s5:[], s6:[]} };
            });

            useEffect(() => { localStorage.setItem('pb_v26_config', JSON.stringify(config)); }, [config]);
            useEffect(() => { localStorage.setItem('pb_v26_current', JSON.stringify(schedule)); }, [schedule]);

            return (
                <div className="min-h-screen p-4 pb-32 relative">
                    <header className="flex justify-between items-center mb-8 relative z-20">
                        <h1 className="comic-title text-5xl">THE<br/>PLAYBOOK</h1>
                        <button onClick={() => setView(view === 'settings' ? 'playbook' : 'settings')} className="bg-white text-black p-3 btn-comic text-xs uppercase">Settings</button>
                    </header>

                    {view === 'settings' ? (
                        <div className="max-w-md mx-auto space-y-8">
                            <h2 className="comic-title text-4xl">HQ SETTINGS</h2>
                            {config.sections.map((sec, i) => (
                                <div key={sec.id} className="bg-white p-4 border-4 border-black shadow-[6px_6px_0px_black] text-black">
                                    <input value={sec.label} onChange={(e) => {
                                        const ns = [...config.sections]; ns[i].label = e.target.value; setConfig({...config, sections: ns});
                                    }} className="w-full font-black uppercase text-xl border-b-2 border-black mb-2" />
                                    <div className="flex justify-between items-center">
                                        <button onClick={() => {
                                            const time = prompt("Enter Time (e.g. 9:00 AM):", sec.time);
                                            if(time) { const ns = [...config.sections]; ns[i].time = time; setConfig({...config, sections: ns}); }
                                        }} className="time-bubble">SET TIME: {sec.time}</button>
                                        <button onClick={() => {
                                            const ns = [...config.sections]; ns[i].active = !ns[i].active; setConfig({...config, sections: ns});
                                        }} className={`px-2 py-1 font-black text-xs ${sec.active ? 'bg-green-400' : 'bg-red-400'}`}>{sec.active ? 'VISIBLE' : 'HIDDEN'}</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <main className="max-w-md mx-auto space-y-12 relative z-10">
                            {Object.keys(schedule).map(day => (
                                <div key={day} className="space-y-4">
                                    <span className="bg-[#E61E27] px-6 py-1 border-2 border-black font-black uppercase text-white italic">{day}</span>
                                    {config.sections.filter(s => s.active).map(sec => (
                                        <div key={sec.id} className="bg-[#b0bec5]/90 p-4 rounded-3xl border-2 border-black space-y-3">
                                            <div style={{backgroundColor: sec.color}} className="flex justify-between items-center p-2 rounded-xl border-2 border-black">
                                                <div className="flex items-center gap-2">
                                                    <span className="time-bubble">{sec.time}</span>
                                                    <span className="font-black text-black uppercase text-xs italic">{sec.label}</span>
                                                </div>
                                                <button onClick={() => {
                                                    const task = prompt(`New task for ${sec.label}:`);
                                                    if(task) setSchedule(prev => ({...prev, [day]: {...prev[day], [sec.id]: [...prev[day][sec.id], task]}}));
                                                }} className="bg-white text-black w-8 h-8 rounded border-2 border-black font-black">+</button>
                                            </div>
                                            {schedule[day][sec.id].map((item, idx) => (
                                                <div key={idx} className="bg-white p-3 rounded-xl border-2 border-black font-black uppercase text-black italic text-xs flex justify-between shadow-[4px_4px_0px_black]">
                                                    <span>{item}</span>
                                                    <button onClick={() => {
                                                        const ns = {...schedule}; ns[day][sec.id].splice(idx, 1); setSchedule(ns);
                                                    }} className="text-red-600 font-black ml-2">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </main>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
