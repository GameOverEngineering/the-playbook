<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Playbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #2d5a27; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
        #root { height: 100vh; width: 100vw; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        .lego-title { 
            font-family: 'Permanent Marker', cursive; 
            text-shadow: 4px 4px 0px #d32f2f, 8px 8px 0px #000;
            color: #fff;
        }

        /* 3D Brick Effect */
        .brick-shadow { 
            box-shadow: 0 6px 0 #1565c0, 0 8px 15px rgba(0,0,0,0.4); 
        }
        .brick-red { box-shadow: 0 6px 0 #b71c1c; }
        .brick-yellow { box-shadow: 0 6px 0 #f9a825; }
        
        /* Lego Stud Pattern Overlay */
        .studs {
            background-image: radial-gradient(circle, rgba(255,255,255,0.15) 2px, transparent 2px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
        
        // Lego Primary Palette
        const BRICK_THEMES = [
            { bg: "#FFD000", border: "#f9a825", text: "#3e2723", shadow: "#f9a825" }, // Yellow
            { bg: "#E53935", border: "#b71c1c", text: "#fff", shadow: "#b71c1c" },    // Red
            { bg: "#1E88E5", border: "#1565c0", text: "#fff", shadow: "#1565c0" },    // Blue
            { bg: "#FFFFFF", border: "#bdbdbd", text: "#1a1a1a", shadow: "#9e9e9e" }, // White
            { bg: "#43A047", border: "#2e7d32", text: "#fff", shadow: "#2e7d32" }     // Green
        ];

        const App = () => {
            const [showArchive, setShowArchive] = useState(false);

            return (
                <div className="relative h-full w-full bg-[#2d5a27] text-white overflow-hidden studs">
                    
                    <main className="relative h-full flex flex-col p-6">
                        <header className="mb-10 pt-4">
                            <h1 className="lego-title text-5xl tracking-tighter text-center uppercase italic">
                                THE PLAYBOOK
                            </h1>
                        </header>

                        <div className="flex-1 overflow-y-auto space-y-8 pb-28 hide-scrollbar">
                            {DAYS.map((day, i) => (
                                <div key={day} className="space-y-3">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-[#E53935] text-white px-4 py-1 rounded-md text-sm font-black uppercase italic shadow-[4px_4px_0px_#b71c1c]">
                                            {day}
                                        </div>
                                        <div className="h-2 flex-1 bg-white/20 rounded-full shadow-inner" />
                                    </div>
                                    
                                    <div 
                                        className="p-5 rounded-xl border-t-2 border-white/30 active:translate-y-1 active:shadow-none transition-all cursor-pointer"
                                        style={{ 
                                            backgroundColor: BRICK_THEMES[i].bg, 
                                            color: BRICK_THEMES[i].text,
                                            boxShadow: `0 8px 0 ${BRICK_THEMES[i].shadow}`
                                        }}
                                    >
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <div className="text-[10px] font-black uppercase opacity-70">09:00 AM SESSION</div>
                                                <div className="text-2xl font-black uppercase italic tracking-tight">Morning AI Lab</div>
                                            </div>
                                            <div className="w-8 h-8 rounded-full border-4 border-black/10 flex items-center justify-center font-black">
                                                ?
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Navigation Dock */}
                    <nav className="absolute bottom-0 left-0 right-0 bg-[#1E88E5] border-t-8 border-[#1565c0] p-6 pb-8 flex justify-around items-center z-40">
                        <button className="text-white font-black uppercase italic tracking-tighter text-lg">Field</button>
                        
                        <button 
                            onClick={() => setShowArchive(true)}
                            className="bg-[#FFD000] text-black w-20 h-16 rounded-xl flex items-center justify-center -mt-16 border-4 border-black shadow-[0_8px_0_#000] active:translate-y-2 active:shadow-none transition-all"
                        >
                            <span className="text-5xl font-black">+</span>
                        </button>

                        <button className="text-white font-black uppercase italic tracking-tighter text-lg opacity-50">Gear</button>
                    </nav>

                    {/* Archive Drawer */}
                    {showArchive && (
                        <div className="fixed inset-0 z-50 flex flex-col justify-end">
                            <div className="absolute inset-0 bg-black/40 backdrop-blur-md" onClick={() => setShowArchive(false)} />
                            <div className="relative bg-[#E53935] rounded-t-[40px] p-8 pb-12 border-t-8 border-[#b71c1c]">
                                <div className="w-20 h-3 bg-black/20 rounded-full mx-auto mb-8 shadow-inner" />
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="lego-title text-3xl italic uppercase">LOCKER ROOM</h2>
                                    <button onClick={() => setShowArchive(false)} className="bg-white text-black px-4 py-2 rounded-lg font-black uppercase text-xs shadow-[4px_4px_0px_#000]">X</button>
                                </div>
                                <div className="grid grid-cols-2 gap-6">
                                    {['BJJ', 'Art', 'Piano', 'Film'].map((item) => (
                                        <div key={item} className="bg-white p-6 rounded-2xl border-4 border-black shadow-[6px_6px_0px_#000] text-center active:translate-x-1 active:translate-y-1 active:shadow-none transition-all">
                                            <div className="font-black uppercase tracking-widest text-xl text-black italic">{item}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
