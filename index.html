<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Playbook: Final Stable Build</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rajdhani:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #2d5a27; font-family: 'Rajdhani', sans-serif; color: white; }
        .comic-title { font-family: 'Bangers', cursive; color: #E61E27; text-shadow: 3px 3px 0px #000, 5px 5px 0px #FFD000; }
        .studs { background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 20px 20px; }
        .btn-comic { transition: transform 0.1s; border: 3px solid black; box-shadow: 4px 4px 0px black; text-transform: uppercase; font-weight: 900; }
        .library-drawer { background: #f4f4f4; border-top: 8px solid black; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; height: 85vh; display: flex; flex-direction: column; border-radius: 30px 30px 0 0; }
        .brick-chip { background: white; color: black; border: 2px solid black; padding: 6px 10px; border-radius: 6px; font-weight: 900; font-size: 10px; box-shadow: 2px 2px 0px black; cursor: pointer; display: inline-block; margin: 4px; }
        .mic-btn { background: #E61E27; color: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border: 3px solid black; box-shadow: 3px 3px 0px black; }
        .mic-active { animation: pulse 1s infinite; background: #22c55e; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="studs">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PLAYBOOKS = {
            "0-2.5": ["Water Play", "Sand Bin", "Ice Melting", "Scent Jars", "Texture Board", "Flashlight Path", "Mirror Faces", "Shaving Cream", "Mud Kitchen", "Jello Dig", "Dry Noodles", "Sponge Squeeze", "Feather Touch", "Rice Scoop", "Oobleck", "Soap Suds", "Edible Paint", "Nature Basket", "Crawl Tunnel", "Balloon Toss", "Sticker Peel", "Block Stack", "Finger Paint", "Bubble Pop", "Ribbon Dance", "Soft Ball", "Climbing", "Magnet Board", "Pom Pom Drop", "Zipping Fun", "Animal Crawls", "Nursery Rhymes", "Puppet Story", "Board Books", "Sing-Along", "First Words", "Story Stones"],
            "2.5-4.5": ["Alphabet Tracing", "Color Sorting", "Shape Hunt", "Counting Steps", "Cutting Skills", "Glue Collage", "Pattern Blocks", "Sidewalk Chalk", "Name Writing", "I-Spy Letters", "Number Puzzles", "Rhyme Match", "Phonics Sounds", "Sorting Laundry", "Button Sorting", "Bead Stringing", "Letter Stamps", "Sticker Math", "Sight Words", "Tracing Sand", "Calendar Time", "Bird Watching", "Bug Hotel", "Planting Seeds", "Sink or Float", "Magnet Fish", "Nature Journal", "Cloud Watch", "Magnifying Glass", "Rock Sort", "Leaf Rub", "Herb Garden", "Worm Farm", "Sun Prints", "Dino Dig", "Volcano", "Snail Race", "Weather Chart", "Moon Phases", "Playdough", "Dress Up", "Fort Build", "Yoga Kids", "Dance Party", "Recycled Art", "Clay Animals", "Mask Making", "Shadow Art", "Paper Planes", "Origami Easy"],
            "4.5-8.5": ["Phonics", "Addition Games", "Subtraction War", "Money Math", "Cursive", "Silent Reading", "Spelling Bee", "Clock Reading", "Geography Map", "History Video", "Creative Writing", "Logic Puzzles", "Typing", "Journaling", "Book Report", "Multiplication", "Word Problems", "Grammar", "Poetry", "Vocabulary", "Research Task", "Pen Pal", "Number Lines", "Science Reading", "BJJ Training", "Piano Practice", "Lego Engineering", "Baking", "Chess", "Skating", "Swimming", "Gymnastics", "Nature Hike", "Gardening", "Woodworking", "Origami", "Team Sports", "Jump Rope", "Obstacle Course", "Yoga Flow", "Martial Arts", "Skateboarding", "Dance Class", "Target Practice", "Navigation", "Fire Safety", "Stretching", "Animal Moves", "Soccer Drills", "Parkour", "Tumbling", "Volcano", "Microscope", "Solar System", "Life Cycles", "Recycling", "Weather", "Electricity Kit", "Diorama", "Magnets", "Bird ID", "Star Gazing", "Growth Log", "Water Filter", "Insect Collection", "Rock Tumbler", "Crystals", "Anatomy", "Chemistry", "Robot Coding", "Circuits"],
            "8.5-12.5": ["Algebra", "Novel Study", "Essay Draft", "Critical Thinking", "Latin Roots", "Debate Prep", "Current Events", "Financial Lit", "Budgeting", "Geography", "Ethics", "Civics", "Stock Market", "Psychology", "Philosophy", "Public Speaking", "Mediation", "Logic Gates", "Speed Reading", "Note Taking", "Memory Palace", "Goal Setting", "Time Management", "Editing", "Persuasive Writing", "Mock Trial", "Ancient History", "World Religions", "Political Science", "Coding Scratch", "Python", "Graphic Design", "Video Editing", "Electronics", "Robotics", "3D Modeling", "Animation", "Podcast", "Photography", "Web Design", "App Design", "Unity Game Dev", "Digital Art", "AI Tools", "Hardware Build", "Linux", "Cyber Security", "Sound Mixing", "Photoshop", "CAD Intro", "BJJ Advanced", "Strength Train", "Survival Skills", "First Aid", "Cooking", "Inventory Mgmt", "Business Plan", "Architecture", "Music Theory", "Anatomy", "Geology", "Auto Basics", "Home Repair", "Taxes", "Contract Law", "Marketing", "Event Plan", "Leadership", "Mental Health", "CPR", "Emergency Prep", "Self Defense", "Tool Prof", "Pitch Deck"]
        };

        const FOOD = ["Oatmeal", "Eggs", "Pancakes", "Yogurt", "Smoothie", "Burrito", "French Toast", "Avocado Toast", "Cereal", "Waffles", "Bacon", "Omelet", "Bagel", "Muffins", "Quiche", "Protein Shake", "Fruit Salad", "Sausage", "English Muffin", "Chicken Wrap", "Turkey Sandwich", "Pasta Salad", "Quinoa Bowl", "Grilled Cheese", "Tomato Soup", "Leftovers", "Hummus", "Quesadilla", "Tuna Salad", "Nuggets", "Beef Stew", "Tacos", "Mac & Cheese", "Egg Salad", "Sub Sandwich", "Stir Fry", "Pizza Bagels", "Baked Potato", "Sushi", "Caesar Salad", "Bento Box", "Ramen", "BLT", "Poke Bowl"];

        function App() {
            const [profile, setProfile] = useState(() => JSON.parse(localStorage.getItem('pb_v12_profile')));
            const [schedule, setSchedule] = useState(() => JSON.parse(localStorage.getItem('pb_v12_sched')) || { Monday: {}, Tuesday: {}, Wednesday: {}, Thursday: {}, Friday: {} });
            const [customButtons, setCustomButtons] = useState(() => JSON.parse(localStorage.getItem('pb_v12_custom')) || { Learn: [], Food: [] });
            const [isEditMode, setIsEditMode] = useState(false);
            const [libraryTarget, setLibraryTarget] = useState(null);
            const [isListening, setIsListening] = useState(false);

            useEffect(() => { if(profile) localStorage.setItem('pb_v12_profile', JSON.stringify(profile)); }, [profile]);
            useEffect(() => { localStorage.setItem('pb_v12_sched', JSON.stringify(schedule)); }, [schedule]);
            useEffect(() => { localStorage.setItem('pb_v12_custom', JSON.stringify(customButtons)); }, [customButtons]);

            const startVoice = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return alert("Voice not supported on this browser.");
                const rec = new SpeechRecognition();
                rec.onstart = () => setIsListening(true);
                rec.onend = () => setIsListening(false);
                rec.onresult = (e) => {
                    const text = e.results[0][0].transcript;
                    const type = libraryTarget.type;
                    setCustomButtons(prev => ({...prev, [type]: [...prev[type], text]}));
                };
                rec.start();
            };

            const updateBlock = (id, field, val) => {
                setProfile(prev => ({ ...prev, blocks: prev.blocks.map(b => b.id === id ? {...b, [field]: val} : b)}));
            };

            if (!profile) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                    <h1 className="comic-title text-6xl mb-10">THE PLAYBOOK</h1>
                    <div className="grid grid-cols-1 gap-4 w-full max-w-xs">
                        {Object.keys(PLAYBOOKS).map(age => (
                            <button key={age} onClick={() => setProfile({ age, blocks: [
                                { id: 'b1', label: 'Breakfast', type: 'Food', time: '08:00', color: '#FF5F1F' },
                                { id: 'b2', label: 'Morning Learning', type: 'Learn', time: '09:00', color: '#FFFFFF' },
                                { id: 'b3', label: 'Lunch', type: 'Food', time: '12:00', color: '#a6ff00' },
                                { id: 'b4', label: 'Afternoon Learning', type: 'Learn', time: '13:00', color: '#FFFFFF' }
                            ]})} className="bg-white text-black py-4 btn-comic font-black text-xl italic shadow-[8px_8px_0px_black]">AGE {age}</button>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 pb-48 studs">
                    <header className="flex justify-between items-center mb-6">
                        <h1 className="comic-title text-4xl">PLAYBOOK</h1>
                        <button onClick={() => setIsEditMode(!isEditMode)} className={`px-4 py-2 btn-comic text-xs ${isEditMode ? 'bg-red-500 text-white' : 'bg-yellow-400 text-black'}`}>
                            {isEditMode ? 'SAVE' : 'EDIT BLOCKS'}
                        </button>
                    </header>

                    <div className="max-w-md mx-auto space-y-8">
                        {["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"].map(day => (
                            <div key={day} className="space-y-4">
                                <h2 className="bg-[#E61E27] inline-block px-4 py-1 border-4 border-black font-black italic shadow-[4px_4px_0px_black]">{day}</h2>
                                {profile.blocks.map(block => (
                                    <div key={block.id} className="bg-gray-200/90 p-4 rounded-2xl border-4 border-black space-y-3 shadow-xl">
                                        <div style={{backgroundColor: block.color}} className="flex justify-between items-center p-3 rounded-xl border-3 border-black shadow-[3px_3px_0px_black]">
                                            <div className="flex items-center gap-3 flex-1">
                                                {isEditMode ? (
                                                    <>
                                                        <input className="w-16 bg-black text-yellow-400 text-[10px] p-1 rounded font-black" value={block.time} onChange={e => updateBlock(block.id, 'time', e.target.value)} />
                                                        <input className="flex-1 bg-white/50 text-black text-xs p-1 font-black uppercase" value={block.label} onChange={e => updateBlock(block.id, 'label', e.target.value)} />
                                                    </>
                                                ) : (
                                                    <>
                                                        <span className="bg-black text-yellow-400 px-2 py-1 rounded text-[10px] font-black">{block.time}</span>
                                                        <span className="text-black font-black italic text-xs uppercase">{block.label}</span>
                                                    </>
                                                )}
                                            </div>
                                            {!isEditMode && (
                                                <button onClick={() => setLibraryTarget({day, id: block.id, type: block.type, label: block.label})} className="bg-white text-black w-10 h-10 rounded border-2 border-black font-black">+</button>
                                            )}
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {(schedule[day][block.id] || []).map((item, i) => (
                                                <div key={i} className="bg-white px-2 py-1 rounded border border-black text-[10px] font-black text-black flex items-center shadow-[1px_1px_0px_black]">
                                                    {item}
                                                    <button onClick={() => {
                                                        const ns = {...schedule}; ns[day][block.id].splice(i, 1); setSchedule(ns);
                                                    }} className="ml-2 text-red-500 font-black">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>

                    {libraryTarget && (
                        <div className="library-drawer p-6 shadow-2xl">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="comic-title text-3xl uppercase">{libraryTarget.label}</h3>
                                <button onClick={() => setLibraryTarget(null)} className="bg-black text-white px-4 py-2 btn-comic text-xs">X</button>
                            </div>
                            
                            <div className="flex items-center gap-4 bg-white p-4 rounded-2xl border-4 border-black mb-6 shadow-[4px_4px_0px_black]">
                                <button onClick={startVoice} className={`mic-btn ${isListening ? 'mic-active' : ''}`}>
                                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                                </button>
                                <span className="text-black font-black text-xs uppercase italic">{isListening ? 'Listening...' : 'Tap Mic to Speak a New Button'}</span>
                            </div>

                            <div className="overflow-y-auto flex-1 pb-10">
                                <div className="flex flex-wrap content-start">
                                    {[...(libraryTarget.type === 'Food' ? FOOD : PLAYBOOKS[profile.age]), ...(customButtons[libraryTarget.type] || [])].map((item, i) => (
                                        <div key={i} onClick={() => {
                                            const ns = {...schedule};
                                            if(!ns[libraryTarget.day][libraryTarget.id]) ns[libraryTarget.day][libraryTarget.id] = [];
                                            ns[libraryTarget.day][libraryTarget.id].push(item);
                                            setSchedule(ns);
                                            setLibraryTarget(null);
                                        }} className="brick-chip">{item}</div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
