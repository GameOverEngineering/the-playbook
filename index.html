<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Playbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #2d5a27; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
        #root { height: 100vh; width: 100vw; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .lego-title { font-family: 'Permanent Marker', cursive; text-shadow: 4px 4px 0px #d32f2f, 8px 8px 0px #000; color: #fff; }
        .studs { background-image: radial-gradient(circle, rgba(255,255,255,0.1) 2px, transparent 2px); background-size: 20px 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
        const BRICK_THEMES = [
            { bg: "#FFD000", shadow: "#f9a825", text: "#3e2723" },
            { bg: "#E53935", shadow: "#b71c1c", text: "#fff" },
            { bg: "#1E88E5", shadow: "#1565c0", text: "#fff" },
            { bg: "#FFFFFF", shadow: "#bdbdbd", text: "#1a1a1a" },
            { bg: "#43A047", shadow: "#2e7d32", text: "#fff" }
        ];

        const App = () => {
            const [showArchive, setShowArchive] = useState(false);
            const [schedule, setSchedule] = useState({
                Monday: ["Morning Learning"],
                Tuesday: ["Morning Learning"],
                Wednesday: ["Morning Learning"],
                Thursday: ["Morning Learning"],
                Friday: ["Morning Learning"]
            });

            const addActivity = (activity) => {
                // For this version, it adds to "Monday" as a test
                setSchedule(prev => ({
                    ...prev,
                    Monday: [...prev.Monday, activity]
                }));
                setShowArchive(false);
            };

            return (
                <div className="relative h-full w-full bg-[#2d5a27] text-white overflow-hidden studs">
                    <main className="relative h-full flex flex-col p-6">
                        <header className="mb-10 pt-4">
                            <h1 className="lego-title text-5xl text-center uppercase italic">THE PLAYBOOK</h1>
                        </header>

                        <div className="flex-1 overflow-y-auto space-y-8 pb-32 hide-scrollbar">
                            {DAYS.map((day, i) => (
                                <div key={day} className="space-y-3">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-[#E53935] text-white px-4 py-1 rounded-md text-sm font-black uppercase italic shadow-[4px_4px_0px_#b71c1c]">{day}</div>
                                        <div className="h-2 flex-1 bg-white/20 rounded-full shadow-inner" />
                                    </div>
                                    
                                    {schedule[day].map((act, idx) => (
                                        <div key={idx} 
                                            className="p-5 rounded-xl border-t-2 border-white/30 shadow-lg"
                                            style={{ backgroundColor: BRICK_THEMES[i % 5].bg, color: BRICK_THEMES[i % 5].text, boxShadow: `0 8px 0 ${BRICK_THEMES[i % 5].shadow}` }}>
                                            <div className="text-2xl font-black uppercase italic leading-tight">{act}</div>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </main>

                    <nav className="absolute bottom-0 left-0 right-0 bg-[#1E88E5] border-t-8 border-[#1565c0] p-6 pb-10 flex justify-around items-center z-40">
                        <div className="text-white font-black uppercase italic text-lg">Field</div>
                        <button onClick={() => setShowArchive(true)} className="bg-[#FFD000] text-black w-20 h-16 rounded-xl border-4 border-black shadow-[0_8px_0_#000] active:translate-y-2 active:shadow-none transition-all">
                            <span className="text-5xl font-black">+</span>
                        </button>
                        <div className="text-white font-black uppercase italic text-lg opacity-50">Gear</div>
                    </nav>

                    {showArchive && (
                        <div className="fixed inset-0 z-50 flex flex-col justify-end">
                            <div className="absolute inset-0 bg-black/60" onClick={() => setShowArchive(false)} />
                            <div className="relative bg-[#E53935] rounded-t-[40px] p-8 pb-12 border-t-8 border-[#b71c1c]">
                                <h2 className="lego-title text-3xl italic uppercase mb-8">LOCKER ROOM</h2>
                                <div className="grid grid-cols-2 gap-6">
                                    {['BJJ', 'Art', 'Piano', 'Film', 'Reading', 'Outdoor'].map((item) => (
                                        <button key={item} 
                                            onClick={() => addActivity(item)}
                                            className="bg-white p-6 rounded-2xl border-4 border-black shadow-[6px_6px_0px_#000] active:translate-y-1 active:shadow-none">
                                            <div className="font-black uppercase text-xl text-black italic">{item}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
