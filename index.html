<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Playbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #2d5a27; font-family: 'Rajdhani', sans-serif; color: white; }
        .lego-title { font-family: 'Permanent Marker', cursive; text-shadow: 3px 3px 0px #d32f2f, 6px 6px 0px #000; }
        .studs { background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 20px 20px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const DAY_THEMES = {
            Monday:    { bg: "#FFD000", shadow: "#f9a825", text: "#3e2723", label: "#E53935" },
            Tuesday:   { bg: "#1E88E5", shadow: "#1565c0", text: "#fff", label: "#FFD000" },
            Wednesday: { bg: "#E53935", shadow: "#b71c1c", text: "#fff", label: "#1E88E5" },
            Thursday:  { bg: "#FFFFFF", shadow: "#bdbdbd", text: "#1a1a1a", label: "#43A047" },
            Friday:    { bg: "#43A047", shadow: "#2e7d32", text: "#fff", label: "#FFD000" }
        };

        const PREMADE = ["Park", "Swimming", "Gym Time", "Dog walk", "Sand box", "ROM", "Zoo", "Bike ride", "Reading", "Numbers/Math", "Art", "Geography/Maps", "Science", "Grocery Shopping", "Library", "Soccer", "Jiu Jitsu/Martial Arts", "Building", "Cars/Trucks/Trains", "Puzzles", "Card Games", "TV/Movie Time"];

        function App() {
            const [schedule, setSchedule] = useState({
                Monday: { morning: [], afternoon: [] },
                Tuesday: { morning: [], afternoon: [] },
                Wednesday: { morning: [], afternoon: [] },
                Thursday: { morning: [], afternoon: [] },
                Friday: { morning: [], afternoon: [] }
            });
            const [showLocker, setShowLocker] = useState(false);
            const [context, setContext] = useState({ day: null, period: null });
            const [customText, setCustomText] = useState("");

            const openLocker = (day, period) => {
                setContext({ day, period });
                setShowLocker(true);
            };

            const addAct = (item) => {
                if (!item) return;
                const { day, period } = context;
                setSchedule(prev => ({
                    ...prev,
                    [day]: { ...prev[day], [period]: [...prev[day][period], item] }
                }));
                setShowLocker(false);
                setCustomText("");
            };

            return (
                <div className="min-h-screen studs p-6 pb-20">
                    <h1 className="lego-title text-5xl text-center italic uppercase mb-10 tracking-tighter">THE PLAYBOOK</h1>
                    
                    <div className="space-y-12">
                        {Object.keys(DAY_THEMES).map(day => (
                            <div key={day} className="space-y-6">
                                <div className="flex items-center gap-3">
                                    <span style={{backgroundColor: DAY_THEMES[day].label}} className="px-4 py-1 rounded font-black italic uppercase shadow-md text-sm">{day}</span>
                                    <div className="h-px flex-1 bg-white/20"></div>
                                </div>

                                {/* Morning Section */}
                                <div className="space-y-3">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-white text-black px-4 py-1 rounded-lg shadow-[0_3px_0_#999] text-[10px] font-black uppercase italic">Morning Learning</div>
                                        <button onClick={() => openLocker(day, 'morning')} className="bg-[#FFD000] text-black w-7 h-7 rounded border-2 border-black shadow-[0_3px_0_#000] active:translate-y-1 font-black text-lg flex items-center justify-center">+</button>
                                    </div>
                                    {schedule[day].morning.map((act, i) => (
                                        <div key={i} className="w-full p-4 rounded-xl border-t-2 border-white/20 shadow-lg" style={{ backgroundColor: DAY_THEMES[day].bg, color: DAY_THEMES[day].text, boxShadow: `0 8px 0 ${DAY_THEMES[day].shadow}` }}>
                                            <span className="text-xl font-black uppercase italic tracking-tight">{act}</span>
                                        </div>
                                    ))}
                                </div>

                                {/* Lunch Break */}
                                <div className="w-full flex items-center gap-2 opacity-40 py-2">
                                    <div className="h-px flex-1 bg-white"></div>
                                    <span className="text-[10px] font-black tracking-widest uppercase">LUNCH BREAK</span>
                                    <div className="h-px flex-1 bg-white"></div>
                                </div>

                                {/* Afternoon Section */}
                                <div className="space-y-3">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-white text-black px-4 py-1 rounded-lg shadow-[0_3px_0_#999] text-[10px] font-black uppercase italic">Afternoon Learning</div>
                                        <button onClick={() => openLocker(day, 'afternoon')} className="bg-[#FFD000] text-black w-7 h-7 rounded border-2 border-black shadow-[0_3px_0_#000] active:translate-y-1 font-black text-lg flex items-center justify-center">+</button>
                                    </div>
                                    {schedule[day].afternoon.map((act, i) => (
                                        <div key={i} className="w-full p-4 rounded-xl border-t-2 border-white/20 shadow-lg" style={{ backgroundColor: DAY_THEMES[day].bg, color: DAY_THEMES[day].text, boxShadow: `0 8px 0 ${DAY_THEMES[day].shadow}` }}>
                                            <span className="text-xl font-black uppercase italic tracking-tight">{act}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>

                    {showLocker && (
                        <div className="fixed inset-0 z-50 flex flex-col justify-end">
                            <div className="absolute inset-0 bg-black/80" onClick={() => setShowLocker(false)}></div>
                            <div className="relative bg-[#E53935] rounded-t-[40px] p-6 border-t-8 border-[#b71c1c] max-h-[80vh] overflow-y-auto hide-scrollbar">
                                <h2 className="lego-title text-2xl italic uppercase mb-4 text-center">ADDING TO {context.period}</h2>
                                <div className="flex gap-2 mb-6 bg-white p-3 rounded-xl border-4 border-black">
                                    <input type="text" value={customText} onChange={e => setCustomText(e.target.value)} placeholder="TYPE CUSTOM..." className="flex-1 outline-none text-black font-black uppercase" />
                                    <button onClick={() => addAct(customText)} className="bg-[#1E88E5] px-4 py-1 rounded font-black italic shadow-md">ADD</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {PREMADE.map(p => (
                                        <button key={p} onClick={() => addAct(p)} className="bg-white p-4 rounded-xl border-4 border-black shadow-[4px_4px_0_#000] text-black font-black uppercase italic text-sm">{p}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
