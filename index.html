function genId(){return "a"+Date.now()+"_"+Math.random().toString(36).slice(2,6);}
function t2m(s){if(!s)return null;var p=s.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function m2t(n){return (Math.floor(n/60)).toString().padStart(2,"0")+":"+(n%60).toString().padStart(2,"0");}
function fmt(s){if(!s)return null;var p=s.split(":"),h=parseInt(p[0]),m=parseInt(p[1]);return (h%12||12)+":"+(m.toString().padStart(2,"0"))+" "+(h>=12?"PM":"AM");}
function fmtD(s){if(!s)return"";return new Date(s+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function fmtDF(s){if(!s)return"";return new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});}
function wkRange(wd){var d=Object.values(wd.days).map(function(x){return x.date;}).filter(Boolean);if(!d.length)return"";return fmtD(d[0])+" - "+fmtD(d[d.length-1]);}
function dayNum(s){if(!s)return"-";return new Date(s+"T12:00:00").getDate();}
function sortA(a){return a.slice().sort(function(a,b){var am=t2m(a.time),bm=t2m(b.time);if(am===null&&bm===null)return 0;if(am===null)return 1;if(bm===null)return -1;return am-bm;});}
function t2px(ts,hs){var m=t2m(ts);if(m===null)return null;return((m-hs*60)/60)*HOUR_PX;}
function px2t(px,hs,he){var total=hs*60+Math.round((px/HOUR_PX)*60/SNAP)*SNAP;var c=Math.max(hs*60,Math.min((he-1)*60+45,total));return m2t(c);}

function TLChip(props){
  var act=props.act, hs=props.hs, he=props.he, cidx=props.cidx;
  var ref=useRef(null);
  var actRef=useRef(act);
  useEffect(function(){actRef.current=act;},[act]);
  var ds=useRef(null);
  var c=chipColor(act,cidx);
  var top=t2px(act.time,hs);
  var H=50;
  useEffect(function(){
    return function(){if(ds.current&&ds.current.gh){try{document.body.removeChild(ds.current.gh);}catch(e){}ds.current=null;}};
  },[]);
  function pDown(e){
    e.stopPropagation();
    var rect=ref.current.getBoundingClientRect();
    var cols=Array.from(document.querySelectorAll("[data-tlc]")).map(function(el){return {rect:el.getBoundingClientRect(),day:el.dataset.tlc};});
    ds.current={sy:e.clientY,sx:e.clientX,ot:top,mv:false,cr:rect,cols:cols,gh:null};
    ref.current.setPointerCapture(e.pointerId);
  }
  function pMove(e){
    if(!ds.current)return;
    var d=ds.current,dy=e.clientY-d.sy,dx=e.clientX-d.sx;
    if(!d.mv&&Math.abs(dy)<6&&Math.abs(dx)<6)return;
    if(!d.mv){
      d.mv=true;
      var g=document.createElement("div");
      g.style.cssText="position:fixed;z-index:9999;pointer-events:none;border-radius:7px;opacity:0.9;font-family:'Arial Black',Arial,sans-serif;font-size:9px;font-weight:900;color:#fff;padding:4px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:"+c.bg+";border-bottom:3px solid "+c.sh+";box-shadow:0 4px 20px rgba(0,0,0,0.5);min-width:40px;max-width:80px;";
      g.textContent=actRef.current.title;
      document.body.appendChild(g);
      d.gh=g;
    }
    d.gh.style.left=(d.cr.left+dx)+"px";
    d.gh.style.top=(d.cr.top+dy)+"px";
    document.querySelectorAll("[data-tlc]").forEach(function(el){el.style.background="transparent";});
    var tc=d.cols.filter(function(col){return e.clientX>=col.rect.left&&e.clientX<=col.rect.right;})[0];
    if(tc){var el=document.querySelector("[data-tlc='"+tc.day+"']");if(el)el.style.background="rgba(255,208,0,0.07)";}
  }
  function pUp(e){
    if(!ds.current)return;
    var d=ds.current;
    if(d.gh){try{document.body.removeChild(d.gh);}catch(err){}d.gh=null;}
    document.querySelectorAll("[data-tlc]").forEach(function(el){el.style.background="transparent";});
    var wasDrag=d.mv,savedAct=Object.assign({},actRef.current),savedDay=props.dayName;
    ds.current=null;
    if(!wasDrag){props.onTap();return;}
    var dy=e.clientY-d.sy,newT=px2t(d.ot+dy,hs,he);
    var tc=d.cols.filter(function(col){return e.clientX>=col.rect.left&&e.clientX<=col.rect.right;})[0];
    props.onDrop(savedAct,savedDay,tc?tc.day:savedDay,newT);
  }
  function pCan(){
    if(!ds.current)return;
    if(ds.current.gh){try{document.body.removeChild(ds.current.gh);}catch(e){}ds.current.gh=null;}
    document.querySelectorAll("[data-tlc]").forEach(function(el){el.style.background="transparent";});
    ds.current=null;
  }
  if(top===null)return null;
  return (
    <div ref={ref} onPointerDown={pDown} onPointerMove={pMove} onPointerUp={pUp} onPointerCancel={pCan}
      style={{position:"absolute",top:top,left:1,right:1,height:H,background:c.bg,borderBottom:"3px solid "+c.sh,borderRadius:7,padding:"4px 5px",cursor:"grab",userSelect:"none",touchAction:"none",boxShadow:"0 2px 8px rgba(0,0,0,0.3)",overflow:"hidden",zIndex:10}}>
      {act.isComplete&&<ICheck z={7} style={{position:"absolute",top:3,right:3,opacity:0.8}}/>}
      <div style={{fontFamily:"'Arial Black',Arial,sans-serif",fontWeight:900,fontSize:9,color:"#fff",textShadow:"0 1px 2px rgba(0,0,0,0.5)",lineHeight:1.2,overflow:"hidden",maxHeight:28,textDecoration:act.isComplete?"line-through":"none",opacity:act.isComplete?0.75:1}}>{act.title}</div>
      {act.time&&<div style={{fontFamily:"Arial,sans-serif",fontSize:7.5,color:"rgba(255,255,255,0.8)",marginTop:2,fontWeight:700}}>{fmt(act.time)}</div>}
    </div>
  );
}

  useEffect(function(){if(scrollRef.current)scrollRef.current.scrollTop=0;},[]);
 
  var dayHeaders=DAYS.map(function(day,i){
    var w=WX[i],dd=props.activeWk.days[day],acts=(dd&&dd.activities)||[];
    var done=acts.filter(function(a){return a.isComplete;}).length;
    return (
      <div key={day} style={{flex:1,padding:"5px 2px 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:1,borderLeft:"1px solid rgba(255,255,255,0.07)"}}>
        <div style={{fontFamily:"'Arial Black',Arial,sans-serif",fontSize:8,fontWeight:900,color:"rgba(255,255,255,0.55)",letterSpacing:"0.5px"}}>{DSHORT[i]}</div>
        <div style={{fontFamily:"'Arial Black',Arial,sans-serif",fontSize:15,fontWeight:900,color:"#fff",lineHeight:1}}>{dayNum(dd?dd.date:null)}</div>
        <WIcon t={w.t}/>
        <span style={{fontFamily:"'Arial Black',Arial,sans-serif",fontSize:7,fontWeight:800,color:"rgba(255,255,255,0.65)"}}>{w.temp}F</span>
        {acts.length>0&&<div style={{background:done===acts.length?"#c62828":"rgba(255,255,255,0.15)",borderRadius:8,padding:"1px 4px",fontSize:7,fontWeight:700,color:"#fff",fontFamily:"Arial,sans-serif"}}>{done}/{acts.length}</div>}
      </div>
    );
  });
 
  var hourLabels=hours.map(function(h){
    return (
      <div key={h} style={{position:"absolute",top:(h-hs)*HOUR_PX-7,left:0,right:0,paddingRight:5,display:"flex",justifyContent:"flex-end",alignItems:"center",height:14}}>
        <span style={{fontFamily:"'Arial Black',Arial,sans-serif",fontSize:7.5,fontWeight:900,color:"#FFD000"}}>{fmtH(h)}</span>
      </div>
    );
  });
 
  var dayCols=DAYS.map(function(day){
    var dd=props.activeWk.days[day];
    var acts=(dd&&dd.activities)||[];
    var scheduled=acts.filter(function(a){return a.time;});
    var nonFixed=acts.filter(function(a){return a.title!=="Breakfast"&&a.title!=="Lunch";});
    var hourLines=hours.map(function(h){return <div key={h} style={{position:"absolute",top:(h-hs)*HOUR_PX,left:0,right:0,height:1,background:"rgba(255,255,255,0.07)"}}/>;});
    var halfLines=hours.slice(0,-1).map(function(h){return <div key={h+"h"} style={{position:"absolute",top:(h-hs)*HOUR_PX+HOUR_PX/2,left:0,right:0,height:1,background:"rgba(255,255,255,0.03)"}}/>;});
    var tapZones=hours.slice(0,-1).map(function(h){
      return <div key={"tz"+h} onClick={function(){props.onAddAt(day,m2t(h*60));}} style={{position:"absolute",top:(h-hs)*HOUR_PX+2,left:0,right:0,height:HOUR_PX-4,zIndex:5,cursor:"crosshair"}}/>;
    });
    var chips=scheduled.map(function(act){
      var cidx=nonFixed.map(function(a){return a.id;}).indexOf(act.id);
      if(cidx<0)cidx=0;
      return <TLChip key={act.id} act={act} dayName={day} hs={hs} he={he} cidx={cidx} onTap={function(){props.onTap(act,day,dd?dd.date:null);}} onDrop={props.onDrop}/>;
    });
    return (
      <div key={day} data-tlc={day} style={{flex:1,borderLeft:"1px solid rgba(255,255,255,0.07)",position:"relative",cursor:"crosshair"}}>
        <div style={{position:"absolute",inset:0,pointerEvents:"none"}}>{hourLines}{halfLines}</div>
        {tapZones}
        {chips}
      </div>
    );
  });
 
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",animation:props.snapAnim?"snapPop 0.5s ease":"none"}}>
      <div style={{display:"flex",borderBottom:"2px solid rgba(255,255,255,0.12)",background:"rgba(0,0,0,0.30)",flexShrink:0}}>
        <div style={{width:TW,flexShrink:0}}/>
        {dayHeaders}
      </div>
      <div ref={scrollRef} style={{flex:1,overflowY:"scroll",overflowX:"hidden"}}>
        <div style={{display:"flex",height:totalPx,position:"relative"}}>
          <div style={{width:TW,flexShrink:0,position:"relative",background:"rgba(0,0,0,0.1)"}}>{hourLabels}</div>
          {dayCols}
        </div>
      </div>
    </div>
  );
}
 
// ---- MAIN APP ---------------------------------------------------------------
function App(){
  var mdState=useState(function(){return loadM();}),modeData=mdState[0],setMD=mdState[1];
  var stState=useState(function(){return loadS()||buildState();}),state=stState[0],setSt=stState[1];
  var libState=useState(function(){var s=loadL();if(s)return s;var m=loadM();return buildLib(m);}),lib=libState[0],setLib=libState[1];
  var modalState=useState(null),modal=modalState[0],setModal=modalState[1];
  var libOState=useState(false),libOpen=libOState[0],setLibO=libOState[1];
  var detState=useState(null),detail=detState[0],setDet=detState[1];
  var snapState=useState(false),snap=snapState[0],setSnap=snapState[1];
  var setsState=useState(false),sets=setsState[0],setSets=setsState[1];
 
  useEffect(function(){saveS(state);},[state]);
  useEffect(function(){saveL(lib);},[lib]);
 
  function handleModeSelect(data){setMD(data);saveM(data);var s=loadL();if(!s||s.length===0)setLib(buildLib(data));}
  function handleModeChange(newMode,newPlanner){
    var data={mode:newMode,planner:newPlanner};setMD(data);saveM(data);
    var existing=lib.map(function(e){return e.title.toLowerCase();});
    var mk=newMode,isHS=newPlanner==="Homeschool";
    var mp=((MODES[mk]&&MODES[mk].extraPresets)||[]).filter(function(p){return existing.indexOf(p.title.toLowerCase())<0;});
    var hp=isHS?((MODES.parent&&MODES.parent.homeschoolPresets)||[]).filter(function(p){return existing.indexOf(p.title.toLowerCase())<0;}):[];
    var newP=hp.concat(mp);
    if(newP.length>0){var ne=newP.map(function(p){return {id:genId(),title:p.title,time:p.time,isPaid:false,cost:0,website:"",mapLink:"",tags:p.tags,useCount:p.useCount,lastUsed:Date.now()-p.useCount*1000};});setLib(function(prev){return ne.concat(prev);});}
  }
 
  if(!modeData)return <Onboard onSelect={handleModeSelect}/>;
 
  var activeWk=state.weeks[state.activeWeek];
  var wkKeys=Object.keys(state.weeks);
  var wkIdx=wkKeys.indexOf(state.activeWeek);
  var totalLib=lib.length;
  var doneWk=Object.values(activeWk.days).reduce(function(acc,d){return acc+(d.activities||[]).filter(function(a){return a.isComplete;}).length;},0);
  var totalWk=Object.values(activeWk.days).reduce(function(acc,d){return acc+(d.activities||[]).length;},0);
  var modeInfo=MODES[modeData.mode]||MODES.parent;
  var isHS=modeData.planner==="Homeschool";
  var headerSub=isHS?"Homeschool Playbook":modeData.planner?modeData.planner+"'s Playbook":modeInfo.label;
 
  function mutDay(dayName,fn){
    setSt(function(prev){
      var wk=Object.assign({},prev.weeks[prev.activeWeek]);
      var dd=Object.assign({},wk.days[dayName]);
      dd.activities=sortA(fn(dd.activities||[]));
      wk.days=Object.assign({},wk.days);wk.days[dayName]=dd;
      var weeks=Object.assign({},prev.weeks);weeks[prev.activeWeek]=wk;
      return Object.assign({},prev,{weeks:weeks});
    });
  }
 
  function handleAdd(activity){
    var day=activity.day;
    var rest=Object.assign({},activity);delete rest.day;
    mutDay(day,function(acts){return acts.concat([Object.assign({},rest,{isComplete:false})]);});
    setLib(function(prev){return upsert(prev,rest);});
    snapSound();setSnap(true);setTimeout(function(){setSnap(false);},600);setModal(null);
  }
 
  function handleAddR(base,rDays,allW){
    setSt(function(prev){
      var nw=Object.assign({},prev.weeks);
      var wkList=allW?Object.keys(nw):[prev.activeWeek];
      wkList.forEach(function(wk){
        var w=Object.assign({},nw[wk]);
        rDays.forEach(function(d){
          if(!w.days[d])return;
          var dd=Object.assign({},w.days[d]);
          dd.activities=sortA((dd.activities||[]).concat([Object.assign({},base,{id:genId(),isComplete:false})]));
          w.days=Object.assign({},w.days);w.days[d]=dd;
        });
        nw[wk]=w;
      });
      return Object.assign({},prev,{weeks:nw});
    });
    setLib(function(prev){return upsert(prev,base);});
    snapSound();setSnap(true);setTimeout(function(){setSnap(false);},600);setModal(null);
  }
 
  function handleLibAdd(entry,day){
    var act={id:genId(),title:entry.title,time:entry.time,isPaid:false,cost:0,website:entry.website||"",mapLink:entry.mapLink||"",tags:entry.tags,notes:"",isComplete:false};
    mutDay(day,function(acts){return acts.concat([act]);});
    setLib(function(prev){return upsert(prev,Object.assign({},entry,{day:day}));});
    snapSound();setSnap(true);setTimeout(function(){setSnap(false);},600);
  }
 
  function handleToggle(dayName,actId){
    setSt(function(prev){
      var wk=Object.assign({},prev.weeks[prev.activeWeek]);
      var dd=Object.assign({},wk.days[dayName]);
      var found=dd.activities.filter(function(a){return a.id===actId;})[0];
      if(found&&!found.isComplete)winSound();
      dd.activities=dd.activities.map(function(a){return a.id===actId?Object.assign({},a,{isComplete:!a.isComplete}):a;});
      wk.days=Object.assign({},wk.days);wk.days[dayName]=dd;
      var weeks=Object.assign({},prev.weeks);weeks[prev.activeWeek]=wk;
      return Object.assign({},prev,{weeks:weeks});
    });
  }
 
  function handleSave(dayName,updated){
    mutDay(dayName,function(acts){return sortA(acts.map(function(a){return a.id===updated.id?updated:a;}));});
    setLib(function(prev){return upsert(prev,updated);});
  }
 
  function handleDel(dayName,actId){
    mutDay(dayName,function(acts){return acts.filter(function(a){return a.id!==actId;});});
  }
 
  function handleDrop(act,fromDay,toDay,newTime){
    setSt(function(prev){
      var nw=Object.assign({},prev.weeks);
      var wk=Object.assign({},nw[prev.activeWeek]);
      if(fromDay===toDay){
        var dd=Object.assign({},wk.days[fromDay]);
        dd.activities=sortA(dd.activities.filter(function(a){return a.id!==act.id;}).concat([Object.assign({},act,{time:newTime})]));
        wk.days=Object.assign({},wk.days);wk.days[fromDay]=dd;
      } else {
        var fd=Object.assign({},wk.days[fromDay]);
        fd.activities=(fd.activities||[]).filter(function(a){return a.id!==act.id;});
        var td=Object.assign({},wk.days[toDay]);
        td.activities=sortA((td.activities||[]).concat([Object.assign({},act,{time:newTime})]));
        wk.days=Object.assign({},wk.days);wk.days[fromDay]=fd;wk.days[toDay]=td;
      }
      nw[prev.activeWeek]=wk;
      return Object.assign({},prev,{weeks:nw});
    });
    snapSound();
  }
 
  function handleAssign(act,dayName,newTime){
    mutDay(dayName,function(acts){return sortA(acts.map(function(a){return a.id===act.id?Object.assign({},a,{time:newTime}):a;}));});
  }
 
  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto",position:"relative"}}>
      <div style={{position:"fixed",inset:0,zIndex:0,backgroundImage:"repeating-linear-gradient(0deg,rgba(0,0,0,0.07) 0px,rgba(0,0,0,0.07) 10px,transparent 10px,transparent 20px),repeating-linear-gradient(90deg,rgba(255,255,255,0.022) 0px,rgba(255,255,255,0.022) 1px,transparent 1px,transparent 40px),linear-gradient(180deg,#2e7320 0%,#337a24 12%,#2a6a1c 25%,#337a24 37%,#2a6a1c 50%,#337a24 62%,#2a6a1c 75%,#337a24 87%,#2a6a1c 100%)"}}/>
      <div style={{position:"relative",zIndex:1,height:"100%",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"7px 10px 5px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(0,0,0,0.40)",borderBottom:"3px solid rgba(255,208,0,0.3)",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:30,height:30,background:"#FFD000",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,borderBottom:"3px solid #b89200",fontFamily:"'Bangers',cursive",color:"#3a2600"}}>{isHS?"[HS]":modeInfo.icon}</div>
            <div>
              <span style={{fontFamily:"'Bangers',cursive",fontSize:24,color:"#FFD000",letterSpacing:"3px",textShadow:"-2px 2px 0 #7a5800",lineHeight:1,display:"block"}}>The Playbook</span>
              <span style={{fontFamily:"Arial,sans-serif",fontSize:9,color:"rgba(255,255,255,0.5)"}}>{headerSub}</span>
            </div>
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:"'Arial Black',Arial,sans-serif",fontSize:8,fontWeight:900,color:"rgba(255,255,255,0.8)",textTransform:"uppercase"}}>{wkRange(activeWk)}</div>
              {totalWk>0&&<div style={{fontSize:8,color:"rgba(255,255,255,0.45)",fontFamily:"Arial,sans-serif"}}>{doneWk}/{totalWk} done</div>}
            </div>
            <LBtn color="gray" small disabled={wkIdx===0} onClick={function(){setSt(function(p){return Object.assign({},p,{activeWeek:wkKeys[wkIdx-1]});});}}>{"<"}</LBtn>
            <LBtn color="gray" small disabled={wkIdx===wkKeys.length-1} onClick={function(){setSt(function(p){return Object.assign({},p,{activeWeek:wkKeys[wkIdx+1]});});}}>{">"}</LBtn>
            <button onClick={function(){setSets(true);}} style={{background:"rgba(255,255,255,0.15)",border:"none",borderBottom:"3px solid rgba(0,0,0,0.3)",borderRadius:7,padding:"5px 7px",cursor:"pointer",color:"#fff",display:"flex",alignItems:"center"}}><ISettings z={12}/></button>
          </div>
        </div>
        <USTray activeWk={activeWk} onAssign={handleAssign} onTap={function(act,day,date){setDet({activity:Object.assign({},act,{_date:date}),dayName:day});}}/>
        <TLGrid activeWk={activeWk} modeData={modeData} onTap={function(act,day,date){setDet({activity:Object.assign({},act,{_date:date}),dayName:day});}} onDrop={handleDrop} onAddAt={function(day,time){setModal({defaultDay:day,defaultTime:time});}} snapAnim={snap}/>
        <div style={{background:"rgba(0,0,0,0.52)",backdropFilter:"blur(10px)",borderTop:"2px solid rgba(255,255,255,0.1)",padding:"7px 10px 12px",display:"flex",gap:6,flexShrink:0}}>
          <button onClick={function(){setModal({defaultDay:DAYS[0]});}} style={{flex:1.4,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,padding:"7px 4px 5px",borderRadius:10,border:"none",cursor:"pointer",background:"#FFD000",color:"#3a2600",borderBottom:"4px solid #b89200",fontFamily:"'Arial Black',Arial,sans-serif",fontWeight:900,fontSize:8,textTransform:"uppercase",lineHeight:1.2}}><IPlus z={15}/> Add to Library</button>
          <button onClick={function(){setLibO(true);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,padding:"7px 4px 5px",borderRadius:10,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.1)",color:"#fff",borderBottom:"4px solid rgba(0,0,0,0.25)",fontFamily:"'Arial Black',Arial,sans-serif",fontWeight:900,fontSize:9,textTransform:"uppercase",position:"relative"}}>
            <IArchive z={15}/>Library
            {totalLib>0&&<div style={{position:"absolute",top:4,right:5,width:14,height:14,borderRadius:"50%",background:"#FFD000",color:"#3a2600",fontSize:8,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{totalLib}</div>}
          </button>
        </div>
      </div>
      {detail&&<Detail activity={detail.activity} dayName={detail.dayName} onClose={function(){setDet(null);}} onSave={function(u){handleSave(detail.dayName,u);setDet(null);}} onToggle={function(id){handleToggle(detail.dayName,id);setDet(function(d){return Object.assign({},d,{activity:Object.assign({},d.activity,{isComplete:!d.activity.isComplete})});});}} onDelete={function(id){handleDel(detail.dayName,id);setDet(null);}}/>}
      {libOpen&&<LibDrawer library={lib} onClose={function(){setLibO(false);}} onAdd={function(e,d){handleLibAdd(e,d);setLibO(false);}} onDel={function(id){setLib(function(prev){return prev.filter(function(e){return e.id!==id;});});}} modeData={modeData}/>}
      {modal&&<AddModal defaultDay={modal.defaultDay} defaultTime={modal.defaultTime} onClose={function(){setModal(null);}} onSave={handleAdd} onSaveR={handleAddR}/>}
      {sets&&<SettingsModal modeData={modeData} onClose={function(){setSets(false);}} onChange={handleModeChange}/>}
    </div>
  );
}
 
var root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
