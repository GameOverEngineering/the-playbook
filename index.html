    <style>
        body { margin: 0; background: #2d5a27; font-family: 'Rajdhani', sans-serif; color: white; overflow-x: hidden; }
        .comic-title { font-family: 'Bangers', cursive; color: #E61E27; text-shadow: 3px 3px 0px #000, 5px 5px 0px #FFD000; }
        .studs { background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 20px 20px; }
        .btn-comic { transition: transform 0.1s; border: 3px solid black; box-shadow: 4px 4px 0px black; text-transform: uppercase; font-weight: 900; }
        .btn-comic:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px black; }
        .library-drawer { background: #f4f4f4; border-top: 8px solid black; box-shadow: 0 -15px 50px rgba(0,0,0,0.8); position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; height: 90vh; display: flex; flex-direction: column; }
        .brick-chip { background: white; color: black; border: 2px solid black; padding: 6px 10px; border-radius: 6px; font-weight: 900; font-size: 10px; box-shadow: 2px 2px 0px black; cursor: pointer; display: inline-block; margin: 4px; }
        
        /* Edit Mode Styles */
        .edit-input { background: rgba(255,255,255,0.2); border: 2px dashed black; color: black; font-weight: 900; text-transform: uppercase; padding: 2px 5px; width: 100%; border-radius: 4px; }
        .edit-time { background: #000; border: 1px dashed #FFD000; color: #FFD000; font-size: 10px; text-align: center; width: 60px; border-radius: 4px; }
        .view-label { font-weight: 900; text-transform: uppercase; color: black; font-style: italic; }
        .view-time { background: black; color: #FFD000; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
