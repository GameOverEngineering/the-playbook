<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Playbook: Sovereign 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rajdhani:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #2d5a27; font-family: 'Rajdhani', sans-serif; color: white; overflow-x: hidden; }
        .comic-title { font-family: 'Bangers', cursive; color: #E61E27; text-shadow: 3px 3px 0px #000, 6px 6px 0px #FFD000; }
        .studs { background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 20px 20px; }
        .settings-card { background: white; color: black; border: 4px solid black; box-shadow: 8px 8px 0px black; }
        .btn-comic { transition: transform 0.1s; border: 3px solid black; box-shadow: 4px 4px 0px black; text-transform: uppercase; font-weight: 900; }
        .btn-comic:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px black; }
        .time-bubble { background: #000; color: #FFD000; padding: 2px 8px; font-size: 10px; border-radius: 5px; font-family: 'Rajdhani'; }
    </style>
</head>
<body class="studs">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('playbook'); 
            const [selectedArchive, setSelectedArchive] = useState(null);

            const [config, setConfig] = useState(() => {
                const saved = localStorage.getItem('pb_v26_config');
                return saved ? JSON.parse(saved) : {
                    hero: false,
                    sections: [
                        { id: 's1', label: 'Breakfast', color: '#FF5F1F', active: true, time: '08:00' },
                        { id: 's2', label: 'Morning Learning', color: '#FFFFFF', active: true, time: '09:30' },
                        { id: 's3', label: 'Lunch', color: '#a6ff00', active: true, time: '12:00' },
                        { id: 's4', label: 'Afternoon Fun', color: '#FFFFFF', active: true, time: '13:30' },
                        { id: 's5', label: 'Evening Activities', color: '#2196F3', active: false, time: '17:00' },
                        { id: 's6', label: 'Bedtime Routine', color: '#9C27B0', active: false, time: '19:30' }
                    ]
                };
            });

            const [schedule, setSchedule] = useState(() => {
                const saved = localStorage.getItem('pb_v26_current');
                return saved ? JSON.parse(saved) : { Monday: {s1:[], s2:[], s3:[], s4:[], s5:[], s6:[]}, Tuesday: {s1:[], s2:[], s3:[], s4:[], s5:[], s6:[]}, Wednesday: {s1:[], s2:[], s3:[], s4:[], s5:[], s6:[]}, Thursday: {s1:[], s2:[], s3:[], s4:[], s5:[], s6:[]}, Friday: {s1:[], s2:[], s3:[], s4:[], s5:[], s6:[]} };
            });

            useEffect(() => { localStorage.setItem('pb_v26_config', JSON.stringify(config)); }, [config]);
            useEffect(() => { localStorage.setItem('pb_v26_current', JSON.stringify(schedule)); }, [schedule]);

            const updateTime = (id) => {
                const newTime = prompt("Set Start Time (e.g. 9:00 AM):");
                if (newTime) {
                    const ns = config.sections.map(s => s.id === id ? {...s, time: newTime} : s);
                    setConfig({...config, sections: ns});
                }
            };

            if (view === 'settings') return (
                <div className="p-6 pb-24">
                    <button onClick={() => setView('playbook')} className="bg-black text-white px-4 py-2 mb-6 btn-comic italic uppercase">← Back</button>
                    <h1 className="comic-title text-5xl mb-6">HQ SETTINGS</h1>
                    
                    <div className="settings-card p-4 mb-8">
                        <h2 className="font-black border-b-4 border-black mb-4 uppercase italic">Configure Blocks</h2>
                        {config.sections.map((sec, i) => (
                            <div key={sec.id} className="mb-6 p-2 border-b-2 border-gray-200">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-xs font-black uppercase text-gray-400 italic">Block {i+1}</span>
                                    <button onClick={() => {
                                        const ns = [...config.sections];
                                        ns[i].active = !ns[i].active;
                                        setConfig({...config, sections: ns});
                                    }} className={`px-3 py-1 text-[10px] font-black border-2 border-black ${sec.active ? 'bg-green-400' : 'bg-red-400'}`}>
                                        {sec.active ? "ON" : "OFF"}
                                    </button>
                                </div>
                                <input value={sec.label} onChange={(e) => {
                                    const ns = [...config.sections]; ns[i].label = e.target.value; setConfig({...config, sections: ns});
                                }} className="w-full border-2 border-black p-2 font-black uppercase mb-2" />
                            </div>
                        ))}
                    </div>

                    <div className="settings-card p-6 border-red-600 border-8">
                        <h2 className="text-2xl font-black italic uppercase">The Hero Unlock</h2>
                        <p className="text-xs font-bold mb-4">Archives, Custom Voice, and Sovereignty Backup.</p>
                        <button onClick={() => setConfig({...config, hero: !config.hero})} className="w-full p-4 bg-yellow-400 font-black btn-comic text-xl">
                            {config.hero ? "HERO ACTIVE ✓" : "Unlock Hero ($9.99)"}
                        </button>
                    </div>
                </div>
            );

            return (
                <div className={`min-h-screen p-4 pb-32 relative ${selectedArchive ? 'hazard-border' : ''}`}>
                    <header className="flex justify-between items-center mb-8 relative z-20">
                        <h1 className="comic-title text-5xl">THE<br/>PLAYBOOK</h1>
                        <button onClick={() => setView('settings')} className="bg-white text-black p-3 btn-comic text-xs uppercase">Settings</button>
                    </header>

                    <main className="max-w-md mx-auto space-y-12 relative z-10">
                        {Object.keys(schedule).map(day => (
                            <div key={day} className="space-y-4">
                                <span className="bg-[#E61E27] px-6 py-1 border-2 border-black font-black uppercase text-white shadow-[4px_4px_0px_#000] italic">{day}</span>
                                {config.sections.filter(s => s.active).map(sec => (
                                    <div key={sec.id} className="bg-[#b0bec5]/90 p-4 rounded-3xl border-2 border-black space-y-3">
                                        <div style={{backgroundColor: sec.color}} className="flex justify-between items-center p-2 rounded-xl border-2 border-black">
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => updateTime(sec.id)} className="time-bubble">{sec.time}</button>
                                                <span className="font-black text-black uppercase text-xs italic">{sec.label}</span>
                                            </div>
                                            {!selectedArchive && (
                                                <button onClick={() => {
                                                    const task = prompt(`Task for ${sec.label}:`);
                                                    if(task) setSchedule(prev => ({...prev, [day]: {...prev[day], [sec.id]: [...prev[day][sec.id], task]}}));
                                                }} className="bg-white text-black w-8 h-8 rounded border-2 border-black font-black">+</button>
                                            )}
                                        </div>
                                        {(selectedArchive || schedule)[day][sec.id].map((item, idx) => (
                                            <div key={idx} className="bg-white p-4 rounded-xl border-2 border-black font-black uppercase text-black italic text-xs flex justify-between shadow-[4px_4px_0px_black]">
                                                <span>{item}</span>
                                                {!selectedArchive && <button onClick={() => {
                                                    const ns = {...schedule}; ns[day][sec.id].splice(idx, 1); setSchedule(ns);
                                                }} className="text-red-600 font-black">✕</button>}
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        ))}
                    </main>

                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
                        <button onClick={() => {if(config.hero) alert("Week Archived!"); else alert("Hero feature!")}} className="bg-green-600 text-white px-10 py-5 btn-comic text-xl">Archive Week</button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
