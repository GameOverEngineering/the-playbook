<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Playbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #2d5a27; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
        #root { height: 100vh; width: 100vw; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Fun Textures & Shadows */
        .title-font { 
            font-family: 'Permanent Marker', cursive; 
            text-shadow: 3px 3px 0px #000;
            background: linear-gradient(to bottom, #fff 40%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-shadow { box-shadow: 6px 6px 0px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
        const ACTIVITY_COLORS = [
            { bg: "rgba(255,208,0,0.3)", border: "#FFD000", accent: "#ffd700" },
            { bg: "rgba(33,150,243,0.3)", border: "#2196F3", accent: "#64b5f6" },
            { bg: "rgba(76,175,80,0.3)", border: "#4CAF50", accent: "#81c784" },
            { bg: "rgba(244,67,54,0.3)", border: "#F44336", accent: "#e57373" },
            { bg: "rgba(156,39,176,0.3)", border: "#9C27B0", accent: "#ba68c8" }
        ];

        const App = () => {
            const [showArchive, setShowArchive] = useState(false);
            const [activeTab, setActiveTab] = useState("schedule");

            return (
                <div className="relative h-full w-full bg-[#2d5a27] text-white overflow-hidden">
                    <div className="absolute inset-0 opacity-20 pointer-events-none" 
                         style={{ backgroundImage: `url("https://www.transparenttextures.com/patterns/p6-mini.png")` }} />
                    
                    <main className="relative h-full flex flex-col p-6">
                        <header className="mb-6 text-center">
                            <h1 className="title-font text-5xl tracking-widest leading-none py-2">THE PLAYBOOK</h1>
                            <p className="text-yellow-400 text-xs font-bold uppercase tracking-[0.3em] mt-1 italic">
                                Mississauga Elite Lab
                            </p>
                        </header>

                        <div className="flex-1 overflow-y-auto space-y-6 pb-28 hide-scrollbar">
                            {DAYS.map((day, i) => (
                                <div key={day} className="space-y-3">
                                    <div className="flex items-center gap-2">
                                        <span className="bg-yellow-400 text-black px-3 py-0.5 rounded-full text-xs font-black uppercase italic shadow-[2px_2px_0px_#000]">
                                            {day}
                                        </span>
                                        <div className="h-[2px] flex-1 bg-gradient-to-r from-yellow-400/50 to-transparent" />
                                    </div>
                                    <div 
                                        className="p-5 rounded-2xl border-2 card-shadow active:scale-95 transition-transform"
                                        style={{ backgroundColor: ACTIVITY_COLORS[i].bg, borderColor: ACTIVITY_COLORS[i].border }}
                                    >
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <div className="text-[10px] font-black text-white/60 uppercase mb-1 tracking-tighter">09:00 AM kickoff</div>
                                                <div className="text-2xl font-black uppercase italic leading-none tracking-tight">Morning AI Lab</div>
                                            </div>
                                            <div className="text-2xl opacity-50">⚡</div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Navigation Dock */}
                    <nav className="absolute bottom-0 left-0 right-0 bg-black/90 backdrop-blur-xl border-t-2 border-yellow-400/30 p-6 pb-8 flex justify-around items-center z-40">
                        <button onClick={() => setActiveTab("schedule")} className={activeTab === "schedule" ? "text-yellow-400" : "text-white/40"}>
                           <div className="text-xs font-black uppercase italic tracking-widest">Field</div>
                        </button>
                        
                        <button 
                            onClick={() => setShowArchive(true)}
                            className="bg-yellow-400 text-black w-16 h-16 rounded-2xl flex items-center justify-center -mt-14 shadow-[0_8px_0_#b89200] border-2 border-black active:translate-y-1 active:shadow-none transition-all"
                        >
                            <span className="text-4xl font-black">+</span>
                        </button>

                        <button onClick={() => setActiveTab("settings")} className={activeTab === "settings" ? "text-yellow-400" : "text-white/40"}>
                            <div className="text-xs font-black uppercase italic tracking-widest">Gear</div>
                        </button>
                    </nav>

                    {/* Archive Drawer */}
                    {showArchive && (
                        <div className="fixed inset-0 z-50 flex flex-col justify-end">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setShowArchive(false)} />
                            <div className="relative bg-[#111] rounded-t-[40px] p-8 pb-12 border-t-4 border-yellow-400">
                                <div className="w-16 h-2 bg-white/10 rounded-full mx-auto mb-8" />
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="title-font text-3xl italic uppercase text-yellow-400">The Locker Room</h2>
                                    <button onClick={() => setShowArchive(false)} className="bg-white/10 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">X Close</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {['BJJ', 'Art', 'Piano', 'Film'].map((item) => (
                                        <div key={item} className="bg-white/5 p-6 rounded-3xl border-2 border-white/10 active:border-yellow-400 transition-all text-center">
                                            <div className="font-black uppercase tracking-widest text-lg italic">{item}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
