<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Playbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #2d5a27; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
        #root { height: 100vh; width: 100vw; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .lego-title { font-family: 'Permanent Marker', cursive; text-shadow: 4px 4px 0px #d32f2f, 8px 8px 0px #000; color: #fff; }
        .studs { background-image: radial-gradient(circle, rgba(255,255,255,0.1) 2px, transparent 2px); background-size: 20px 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
        const PREMADE = [
            "Park", "Swimming", "Gym Time", "Dog walk", "Sand box", "ROM", "Zoo", 
            "Bike ride", "Reading", "Numbers/Math", "Art", "Geography/Maps", 
            "Science", "Grocery Shopping", "Library", "Soccer", 
            "Jiu Jitsu/Martial Arts", "Building", "Cars/Trucks/Trains", 
            "Puzzles", "Card Games", "TV/Movie Time"
        ];

        const BRICK_THEMES = [
            { bg: "#FFD000", shadow: "#f9a825", text: "#3e2723" },
            { bg: "#E53935", shadow: "#b71c1c", text: "#fff" },
            { bg: "#1E88E5", shadow: "#1565c0", text: "#fff" },
            { bg: "#FFFFFF", shadow: "#bdbdbd", text: "#1a1a1a" },
            { bg: "#43A047", shadow: "#2e7d32", text: "#fff" }
        ];

        const App = () => {
            const [showArchive, setShowArchive] = useState(false);
            const [activeDay, setActiveDay] = useState(null);
            const [customText, setCustomText] = useState("");
            const [schedule, setSchedule] = useState({
                Monday: ["Morning Learning"],
                Tuesday: ["Morning Learning"],
                Wednesday: ["Morning Learning"],
                Thursday: ["Morning Learning"],
                Friday: ["Morning Learning"]
            });

            const handleOpenLocker = (day) => {
                setActiveDay(day);
                setShowArchive(true);
            };

            const addActivity = (activity) => {
                if (!activity) return;
                setSchedule(prev => ({
                    ...prev,
                    [activeDay]: [...prev[activeDay], activity]
                }));
                setShowArchive(false);
                setCustomText("");
            };

            return (
                <div className="relative h-full w-full bg-[#2d5a27] text-white overflow-hidden studs">
                    <main className="relative h-full flex flex-col p-6">
                        <header className="mb-8 pt-4">
                            <h1 className="lego-title text-5xl text-center uppercase italic leading-none">THE PLAYBOOK</h1>
                        </header>

                        <div className="flex-1 overflow-y-auto space-y-8 pb-10 hide-scrollbar">
                            {DAYS.map((day, i) => (
                                <div key={day} className="space-y-4">
                                    <div className="flex items-center justify-between gap-3">
                                        <div className="bg-[#E53935] text-white px-4 py-1 rounded-md text-sm font-black uppercase italic shadow-[4px_4px_0px_#b71c1c]">
                                            {day}
                                        </div>
                                        <div className="h-1 flex-1 bg-white/20 rounded-full" />
                                        <button 
                                            onClick={() => handleOpenLocker(day)}
                                            className="bg-[#FFD000] text-black w-10 h-10 rounded-lg flex items-center justify-center border-2 border-black shadow-[0_4px_0_#000] active:translate-y-1 active:shadow-none transition-all"
                                        >
                                            <span className="text-2xl font-black">+</span>
                                        </button>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {schedule[day].map((act, idx) => (
                                            <div key={idx} 
                                                className="p-4 rounded-xl border-t-2 border-white/20 shadow-lg"
                                                style={{ 
                                                    backgroundColor: BRICK_THEMES[i % 5].bg, 
                                                    color: BRICK_THEMES[i % 5].text, 
                                                    boxShadow: `0 6px 0 ${BRICK_THEMES[i % 5].shadow}` 
                                                }}>
                                                <div className="text-xl font-black uppercase italic leading-tight">{act}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Locker Room Drawer */}
                    {showArchive && (
                        <div className="fixed inset-0 z-50 flex flex-col justify-end">
                            <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={() => setShowArchive(false)} />
                            <div className="relative bg-[#E53935] rounded-t-[40px] p-6 pb-10 border-t-8 border-[#b71c1c] max-h-[85vh] flex flex-col">
                                <div className="w-16 h-2 bg-black/20 rounded-full mx-auto mb-6" />
                                
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="lego-title text-3xl italic uppercase tracking-tighter">LOCKER ROOM: {activeDay}</h2>
                                    <button onClick={() => setShowArchive(false)} className="bg-white text-black px-3 py-1 rounded font-black text-xs shadow-[3px_3px_0px_#000]">X</button>
                                </div>

                                {/* Custom Input Section */}
                                <div className="mb-6 bg-white p-3 rounded-xl border-4 border-black shadow-[4px_4px_0px_#000] flex gap-2">
                                    <input 
                                        type="text" 
                                        value={customText}
                                        onChange={(e) => setCustomText(e.target.value)}
                                        placeholder="TYPE CUSTOM..."
                                        className="flex-1 bg-transparent text-black font-black uppercase placeholder:text-gray-400 outline-none px-2"
                                    />
                                    <button 
                                        onClick={() => addActivity(customText)}
                                        className="bg-[#1E88E5] text-white px-4 py-1 rounded-lg font-black italic shadow-[2px_2px_0px_#1565c0]"
                                    >
                                        ADD
                                    </button>
                                </div>

                                <div className="flex-1 overflow-y-auto grid grid-cols-2 gap-4 pb-4 hide-scrollbar">
                                    {PREMADE.map((item) => (
                                        <button key={item} 
                                            onClick={() => addActivity(item)}
                                            className="bg-white p-4 rounded-xl border-4 border-black shadow-[4px_4px_0px_#000] active:translate-y-1 active:shadow-none">
                                            <div className="font-black uppercase text-sm text-black italic text-center">{item}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
