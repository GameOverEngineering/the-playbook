<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Playbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rajdhani:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #2d5a27; font-family: 'Rajdhani', sans-serif; color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .comic-title { 
            font-family: 'Bangers', cursive; 
            letter-spacing: 0.1em;
            color: #E61E27; 
            text-shadow: 4px 4px 0px #000, 8px 8px 0px #FFD000;
            transform: skew(-5deg) rotate(-2deg);
        }

        /* Yellow Pop for the Modal Title */
        .brick-modal-title {
            font-family: 'Bangers', cursive; 
            letter-spacing: 0.1em;
            color: #FFD000; 
            text-shadow: 3px 3px 0px #000;
        }
        
        .studs { background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 20px 20px; }
        .big-text { font-size: 1.6rem; line-height: 1; letter-spacing: -0.02em; font-weight: 900; }
        .label-text { font-size: 1.1rem; font-weight: 900; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DAY_THEMES = {
            Monday:    { bg: "#FFD000", shadow: "#f9a825", text: "#000", label: "#E61E27" },
            Tuesday:   { bg: "#1E88E5", shadow: "#1565c0", text: "#fff", label: "#FFD000" },
            Wednesday: { bg: "#E61E27", shadow: "#b71c1c", text: "#fff", label: "#1E88E5" },
            Thursday:  { bg: "#FFFFFF", shadow: "#bdbdbd", text: "#000", label: "#43A047" },
            Friday:    { bg: "#43A047", shadow: "#2e7d32", text: "#fff", label: "#FFD000" }
        };

        const NUTRITION = {
            "Pizza": { cal: 300, sugar: 4 }, "Tacos": { cal: 200, sugar: 2 }, "Pasta": { cal: 350, sugar: 5 },
            "Sandwich": { cal: 250, sugar: 3 }, "Burger": { cal: 450, sugar: 7 }, "Chicken": { cal: 200, sugar: 0 },
            "Fruit": { cal: 80, sugar: 14 }, "Eggs": { cal: 140, sugar: 1 }, "Cereal": { cal: 150, sugar: 12 },
            "Oatmeal": { cal: 160, sugar: 1 }, "Pancakes": { cal: 300, sugar: 15 }, "Yogurt": { cal: 120, sugar: 10 }
        };

        const PREMADE_ACTS = ["Park", "Swimming", "Gym", "Dog Walk", "BJJ", "Art", "Math", "Reading", "Science", "Music", "Building", "Movies"];
        const PREMADE_FOOD = ["Eggs", "Cereal", "Oatmeal", "Pancakes", "Yogurt", "Pizza", "Tacos", "Pasta", "Sandwich", "Burger", "Chicken", "Fruit"];

        function App() {
            const [schedule, setSchedule] = useState(() => {
                const saved = localStorage.getItem('playbook_v10');
                return saved ? JSON.parse(saved) : {
                    Monday: { morning: [], breakfast: [], lunch: [], afternoon: [] },
                    Tuesday: { morning: [], breakfast: [], lunch: [], afternoon: [] },
                    Wednesday: { morning: [], breakfast: [], lunch: [], afternoon: [] },
                    Thursday: { morning: [], breakfast: [], lunch: [], afternoon: [] },
                    Friday: { morning: [], breakfast: [], lunch: [], afternoon: [] }
                };
            });

            const [showLocker, setShowLocker] = useState(false);
            const [context, setContext] = useState({ day: null, period: null });
            const [customText, setCustomText] = useState("");
            const [movingItem, setMovingItem] = useState(null);

            useEffect(() => { localStorage.setItem('playbook_v10', JSON.stringify(schedule)); }, [schedule]);

            const getStats = (day) => {
                let cal = 0, sugar = 0;
                [...schedule[day].breakfast, ...schedule[day].lunch].forEach(item => {
                    if (NUTRITION[item]) {
                        cal += NUTRITION[item].cal;
                        sugar += NUTRITION[item].sugar;
                    }
                });
                return { cal, sugar };
            };

            const addAct = (item) => {
                if (!item) return;
                setSchedule(prev => ({
                    ...prev, [context.day]: { ...prev[context.day], [context.period]: [...prev[context.day][context.period], item] }
                }));
                setShowLocker(false);
                setCustomText("");
            };

            const removeAct = (day, period, index, e) => {
                e.stopPropagation();
                const newSchedule = { ...schedule };
                newSchedule[day][period].splice(index, 1);
                setSchedule(newSchedule);
            };

            const placeItem = (day, period) => {
                if (!movingItem) return;
                const newSchedule = { ...schedule };
                newSchedule[movingItem.day][movingItem.period].splice(movingItem.index, 1);
                newSchedule[day][period].push(movingItem.name);
                setSchedule(newSchedule);
                setMovingItem(null);
            };

            const SectionHeader = ({ day, period, title, btnColor, headerBg, textColor, borderColor = 'border-black' }) => (
                <div className={`flex items-center justify-between p-2 rounded-xl border-2 ${borderColor} shadow-[4px_4px_0px_#000] ${headerBg} ${textColor}`}>
                    <span className="label-text uppercase italic ml-2">{title}</span>
                    <div className="flex gap-2">
                        {movingItem && <button onClick={() => placeItem(day, period)} className="bg-blue-500 text-white px-3 py-1 rounded font-black border-2 border-black text-xs">DROP</button>}
                        <button onClick={() => { setContext({day, period}); setShowLocker(true); }} className={`${btnColor} text-black w-10 h-10 rounded border-2 border-black shadow-[0_3px_0_#000] font-black text-3xl flex items-center justify-center active:translate-y-1`}>+</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen studs p-4 pb-32">
                    <header className="flex justify-center mb-12 mt-4">
                        <div className="border-4 border-black p-4 bg-black/30 rounded-lg text-center">
                            <h1 className="comic-title text-5xl md:text-7xl uppercase">THE PLAYBOOK</h1>
                        </div>
                    </header>
                    
                    <div className="space-y-12">
                        {Object.keys(DAY_THEMES).map(day => {
                            const stats = getStats(day);
                            return (
                                <div key={day} className="space-y-6">
                                    <div className="flex items-center justify-between gap-2">
                                        <span style={{backgroundColor: DAY_THEMES[day].label, color: day === 'Tuesday' || day === 'Friday' ? 'black' : 'white'}} className="px-5 py-1 rounded-lg font-black italic uppercase shadow-[4px_4px_0px_#000] border-2 border-black label-text">{day}</span>
                                        <div className="bg-black/40 px-3 py-1 rounded-lg border border-white/20 text-[10px] font-black uppercase text-right">
                                            Fuel: {stats.cal}cal | <span className={stats.sugar > 25 ? 'text-red-400 animate-pulse' : 'text-white'}>Sugar: {stats.sugar}g</span>
                                        </div>
                                    </div>

                                    {/* BREAKFAST BOX - GREY OUTER / NEON ORANGE INNER */}
                                    <div className="bg-[#b0bec5]/90 p-3 rounded-3xl border-2 border-[#607d8b]/60 space-y-3">
                                        <SectionHeader 
                                            day={day} period="breakfast" title="BREAKFAST BOX" btnColor="bg-[#FFD000]" 
                                            headerBg="bg-[#ffab40]" textColor="text-black" 
                                            borderColor="border-black" />
                                        <div className="space-y-4 px-1">
                                            {schedule[day].breakfast.map((act, i) => (
                                                <div key={i} onClick={() => setMovingItem({day, period: 'breakfast', index: i, name: act})} className="relative flex items-center justify-between p-5 rounded-2xl border-2 border-black bg-white text-black shadow-[0_10px_0_#999,0_10px_0_2px_#000]">
                                                    <span className="big-text uppercase italic">{act}</span>
                                                    <button onClick={(e) => removeAct(day, 'breakfast', i, e)} className="bg-red-600 text-white w-10 h-10 rounded-full border-2 border-black font-black text-xl">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <SectionHeader day={day} period="morning" title="Morning Learning" btnColor="bg-[#FFD000]" headerBg="bg-white" textColor="text-black" />
                                    <div className="space-y-4">
                                        {schedule[day].morning.map((act, i) => (
                                            <div key={i} onClick={() => setMovingItem({day, period: 'morning', index: i, name: act})} className="relative flex items-center justify-between p-5 rounded-2xl border-2 border-black shadow-[0_10px_0_#999,0_10px_0_2px_#000]" style={{ backgroundColor: DAY_THEMES[day].bg, color: DAY_THEMES[day].text }}>
                                                <span className="big-text uppercase italic">{act}</span>
                                                <button onClick={(e) => removeAct(day, 'morning', i, e)} className="bg-red-600 text-white w-10 h-10 rounded-full border-2 border-black font-black text-xl">✕</button>
                                            </div>
                                        ))}
                                    </div>

                                    {/* LUNCH BOX - BROWN ZONE */}
                                    <div className="bg-[#efebe9]/95 p-3 rounded-3xl border-2 border-black/20 space-y-3">
                                        <SectionHeader day={day} period="lunch" title="LUNCH BOX" btnColor="bg-[#8d6e63]" headerBg="bg-[#5d4037]" textColor="text-white" />
                                        <div className="space-y-4 px-1">
                                            {schedule[day].lunch.map((act, i) => (
                                                <div key={i} onClick={() => setMovingItem({day, period: 'lunch', index: i, name: act})} className="relative flex items-center justify-between p-5 rounded-2xl border-2 border-black bg-white text-black shadow-[0_10px_0_#999,0_10px_0_2px_#000]">
                                                    <span className="big-text uppercase italic">{act}</span>
                                                    <button onClick={(e) => removeAct(day, 'lunch', i, e)} className="bg-red-600 text-white w-10 h-10 rounded-full border-2 border-black font-black text-xl">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <SectionHeader day={day} period="afternoon" title="Afternoon Learning" btnColor="bg-[#FFD000]" headerBg="bg-white" textColor="text-black" />
                                    <div className="space-y-4">
                                        {schedule[day].afternoon.map((act, i) => (
                                            <div key={i} onClick={() => setMovingItem({day, period: 'afternoon', index: i, name: act})} className="relative flex items-center justify-between p-5 rounded-2xl border-2 border-black shadow-[0_10px_0_#999,0_10px_0_2px_#000]" style={{ backgroundColor: DAY_THEMES[day].bg, color: DAY_THEMES[day].text }}>
                                                <span className="big-text uppercase italic">{act}</span>
                                                <button onClick={(e) => removeAct(day, 'afternoon', i, e)} className="bg-red-600 text-white w-10 h-10 rounded-full border-2 border-black font-black text-xl">✕</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* PICK A BRICK MODAL */}
                    {showLocker && (
                        <div className="fixed inset-0 z-50 flex flex-col justify-end">
                            <div className="absolute inset-0 bg-black/90" onClick={() => setShowLocker(false)}></div>
                            <div className="relative bg-[#E61E27] rounded-t-[40px] p-6 border-t-8 border-black max-h-[85vh] overflow-y-auto">
                                <h2 className="brick-modal-title text-5xl uppercase mb-6 text-center tracking-tight">PICK A BRICK</h2>
                                <div className="flex gap-2 mb-8 bg-white p-3 rounded-2xl border-4 border-black">
                                    <input type="text" value={customText} onChange={e => setCustomText(e.target.value)} placeholder="CUSTOM..." className="flex-1 outline-none text-black font-black uppercase text-xl" />
                                    <button onClick={() => addAct(customText)} className="bg-[#1E88E5] text-white px-6 py-2 rounded-xl border-2 border-black font-black italic">ADD</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4 pb-10">
                                    {(context.period === 'lunch' || context.period === 'breakfast' ? PREMADE_FOOD : PREMADE_ACTS).map(p => (
                                        <button key={p} onClick={() => addAct(p)} className="bg-white p-5 rounded-2xl border-4 border-black shadow-[6px_6px_0px_#000] text-black font-black uppercase italic text-xl active:translate-y-1">{p}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
